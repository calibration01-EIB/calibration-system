name: Apply compact dashboard redesign

on:
  push:
    branches: ["codex/compact-dashboard"]
    paths:
      - ".github/workflows/apply-compact-dashboard.yml"
      - ".github/scripts/apply-compact-dashboard.mjs"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/compact-dashboard
          fetch-depth: 0

      - name: Apply dashboard redesign
        run: node .github/scripts/apply-compact-dashboard.mjs

      - name: Commit dashboard redesign
        shell: bash
        run: |
          git diff --check
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Redesign dashboard for compact work overview"
          git push origin HEAD:codex/compact-dashboard
