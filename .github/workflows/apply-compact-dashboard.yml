            <div style="display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text2);flex-wrap:wrap;justify-content:flex-end">
              <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block"></span>เกินกำหนด</span>
              <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--amber);display:inline-block"></span>ใกล้ครบ</span>
              <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>ปกติ</span>
            </div>
