name: Apply formal dashboard update

on:
  push:
    branches:
      - codex/compact-dashboard
    paths:
      - '.github/scripts/apply-formal-dashboard-20260606.mjs'
      - '.github/workflows/apply-formal-dashboard-20260606.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/compact-dashboard
      - name: Apply dashboard update
        run: node .github/scripts/apply-formal-dashboard-20260606.mjs
      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html js/04-reports.js sw.js .github/scripts/apply-formal-dashboard-20260606.mjs .github/workflows/apply-formal-dashboard-20260606.yml
            git commit -m "Add formal dashboard category overview"
            git push origin HEAD:codex/compact-dashboard
          else
            echo "No changes to commit"
          fi
