<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instrument Registry Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg: #eef4f8;
  --surface: #ffffff;
  --surface-soft: #f7fafc;
  --line: #d9e5ee;
  --line-soft: #eaf0f5;
  --text: #102337;
  --muted: #61758a;
  --soft: #8aa0b4;
  --accent: #0788a6;
  --accent-soft: #e4f8fb;
  --green: #168a4a;
  --green-soft: #ecfdf3;
  --amber: #ee7b12;
  --amber-soft: #fff5e9;
  --red: #dc3545;
  --red-soft: #fff0f2;
  --blue: #2563eb;
  --radius: 8px;
  --shadow: 0 14px 34px rgba(25, 58, 90, .08);
  --font: "IBM Plex Sans Thai", sans-serif;
  --mono: "IBM Plex Mono", monospace;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.45;
}
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
.page {
  width: min(1240px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 22px 0 44px;
}
.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}
.title-block h1 {
  margin: 0;
  font-size: 22px;
  line-height: 1.2;
  letter-spacing: 0;
}
.title-block p {
  margin: 5px 0 0;
  color: var(--muted);
}
.top-stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.stat {
  min-width: 112px;
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
}
.stat span {
  display: block;
  color: var(--muted);
  font-size: 11px;
}
.stat strong {
  display: block;
  margin-top: 2px;
  font-size: 19px;
  line-height: 1;
}
.toolbar {
  display: grid;
  grid-template-columns: minmax(240px, 1fr) auto;
  gap: 10px;
  align-items: center;
  margin-bottom: 12px;
}
.searchbox {
  position: relative;
}
.searchbox i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--soft);
  font-size: 17px;
}
.searchbox input {
  width: 100%;
  height: 38px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 0 12px 0 36px;
  background: var(--surface);
  color: var(--text);
  outline: none;
}
.searchbox input:focus {
  border-color: rgba(8, 136, 166, .55);
  box-shadow: 0 0 0 3px rgba(8, 136, 166, .12);
}
.select {
  height: 38px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 0 32px 0 12px;
  background: var(--surface);
  color: var(--text);
  outline: none;
}
.category-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 12px;
}
.cat-pill {
  flex: 0 0 auto;
  min-width: 108px;
  border: 1px solid rgba(16, 35, 55, .14);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 10px 12px;
  text-align: left;
}
.cat-pill.active {
  border-color: rgba(16, 35, 55, .22);
  background: #102337;
}
.cat-pill span {
  display: block;
  color: var(--muted);
  font-size: 11px;
}
.cat-pill.active span,
.cat-pill.active strong {
  color: #fff;
}
.cat-pill strong {
  display: block;
  margin-top: 2px;
  color: var(--text);
  font-size: 17px;
}
.registry {
  border: 1px solid rgba(37, 99, 235, .12);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow);
}
.registry-head,
.detail-head {
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
}
.registry-head h2 {
  margin: 0;
  font-size: 15px;
  line-height: 1.25;
}
.muted { color: var(--muted); }
.count-label {
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface-soft);
  color: var(--muted);
  font-weight: 700;
  white-space: nowrap;
}
.iconbox {
  width: 34px;
  height: 34px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  border: 1px solid #cfe1ee;
  border-radius: var(--radius);
  background: #f7fbff;
  color: var(--accent);
  font-size: 18px;
}
.iconbox.b { color: #00897b; background: #e9fbf6; border-color: #bfece0; }
.iconbox.t { color: #d85a30; background: #fff2ec; border-color: #ffd4c2; }
.iconbox.d { color: #185fa5; background: #edf6ff; border-color: #cfe4f8; }
.iconbox.p { color: #534ab7; background: #f2f0ff; border-color: #d9d5ff; }
.iconbox.q { color: #993556; background: #fff0f6; border-color: #f4c6d9; }
.type-chip {
  width: 42px;
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 7px;
  color: #fff;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 800;
  box-shadow: inset 0 -1px 0 rgba(0, 0, 0, .16);
}
.type-chip.b { background: #00897b; }
.type-chip.t { background: #d85a30; }
.type-chip.d { background: #185fa5; }
.type-chip.p { background: #534ab7; }
.type-chip.q { background: #993556; }
.name {
  color: #071f35;
  font-weight: 800;
}
.sub {
  color: var(--muted);
  font-size: 11px;
}
.code {
  font-family: var(--mono);
  color: #38546e;
  font-size: 12px;
}
.id-stack {
  display: grid;
  gap: 2px;
  font-family: var(--mono);
  line-height: 1.35;
}
.id-stack strong {
  color: #102337;
  font-size: 14px;
  font-weight: 800;
}
.id-stack span {
  color: #31465b;
  font-size: 13px;
  font-weight: 700;
}
.badge {
  min-height: 24px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
}
.badge::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.badge.over { color: var(--red); border: 1px solid #ffc8d0; background: var(--red-soft); }
.badge.warn { color: var(--amber); border: 1px solid #ffd0a0; background: var(--amber-soft); }
.badge.ok { color: var(--green); border: 1px solid #b7efca; background: var(--green-soft); }
.table-wrap {
  overflow-x: auto;
}
.table {
  width: 100%;
  min-width: 900px;
  border-collapse: collapse;
}
.table th {
  height: 42px;
  padding: 0 14px;
  text-align: left;
  color: #31465b;
  background: #edf4f8;
  border-bottom: 1px solid var(--line);
  font-size: 11px;
  font-weight: 800;
}
.table td {
  height: 58px;
  padding: 0 14px;
  border-bottom: 1px solid var(--line-soft);
  vertical-align: middle;
}
.table tbody tr {
  cursor: pointer;
}
.table tbody tr:hover,
.table tbody tr.active {
  background: #edf8fb;
}
.instrument-cell {
  display: flex;
  align-items: center;
  gap: 9px;
  min-width: 220px;
}
.empty {
  padding: 28px 16px;
  text-align: center;
  color: var(--muted);
}
.detail-body {
  padding: 8px 10px 10px;
}
.detail-title {
  display: flex;
  gap: 7px;
  align-items: center;
  min-width: 0;
}
.detail-title .name {
  font-size: 14px;
}
.detail-name-row {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}
.detail-title .code {
  color: #102337;
  font-size: 13px;
  font-weight: 700;
}
.detail-title .sub {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 1px;
  color: #4a6075;
  font-size: 11px;
}
.detail-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.btn {
  min-height: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  padding: 0 10px;
  font-weight: 800;
}
.btn:hover {
  border-color: rgba(8, 136, 166, .35);
}
.btn.primary {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
}
.btn.ghost {
  background: var(--surface-soft);
}
.metric-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
  margin-bottom: 8px;
}
.metric {
  min-height: 50px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-soft);
  padding: 6px 8px;
}
.metric > span {
  display: block;
  color: #4a6075;
  font-size: 11px;
  font-weight: 700;
}
.metric strong {
  display: block;
  margin-top: 1px;
  font-size: 13px;
}
.metric strong + span {
  margin-top: 1px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
}
.section-title {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 7px;
  margin: 8px 0 4px;
  color: #102337;
  font-size: 12px;
  font-weight: 800;
}
.section-title::before {
  content: "";
  width: 3px;
  height: 14px;
  flex: 0 0 auto;
  border-radius: 999px;
  background: var(--accent);
}
.section-title span:first-child {
  margin-right: auto;
}
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 10px;
}
.info-item {
  min-width: 0;
  padding: 4px 0;
  border-bottom: 1px solid var(--line-soft);
}
.info-item.full {
  grid-column: 1 / -1;
}
.info-item span {
  display: block;
  color: #4a6075;
  font-size: 11px;
  font-weight: 700;
}
.info-item strong {
  display: block;
  margin-top: 1px;
  color: #102337;
  font-size: 11px;
  font-weight: 800;
  overflow-wrap: anywhere;
}
.file-input {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}
.file-list,
.audit-list {
  display: grid;
  gap: 8px;
}
.file-row,
.audit-row {
  display: grid;
  grid-template-columns: 26px minmax(0, 1fr) auto;
  align-items: center;
  gap: 7px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  padding: 6px 8px;
}
.file-icon,
.audit-icon {
  width: 26px;
  height: 26px;
  display: grid;
  place-items: center;
  border-radius: var(--radius);
  background: var(--accent-soft);
  color: var(--accent);
}
.audit-row {
  align-items: start;
}
.audit-row.edit .audit-icon { background: var(--amber-soft); color: var(--amber); }
.audit-row.file .audit-icon { background: #edf6ff; color: var(--blue); }
.audit-row.add .audit-icon { background: var(--green-soft); color: var(--green); }
.audit-meta {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 11px;
}
.modal {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(16, 35, 55, .42);
}
.modal.open {
  display: flex;
}
.modal-box {
  width: min(760px, 100%);
  max-height: min(760px, calc(100vh - 30px));
  display: flex;
  flex-direction: column;
  border-radius: var(--radius);
  background: #fff;
  box-shadow: 0 24px 70px rgba(0, 0, 0, .22);
}
.detail-modal-box {
  width: min(860px, 100%);
}
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
}
.modal-head h3 {
  margin: 0;
  font-size: 15px;
}
.modal-body {
  overflow: auto;
  padding: 8px 12px 10px;
}
.modal-foot {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 18px;
  border-top: 1px solid var(--line);
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.field {
  display: grid;
  gap: 5px;
}
.field.full {
  grid-column: 1 / -1;
}
.field label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}
.field input,
.field select,
.field textarea {
  width: 100%;
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 8px 10px;
  background: #fff;
  color: var(--text);
  outline: none;
}
.field textarea {
  min-height: 78px;
  resize: vertical;
}
.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: rgba(8, 136, 166, .55);
  box-shadow: 0 0 0 3px rgba(8, 136, 166, .12);
}
.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 80;
  display: none;
  min-height: 40px;
  align-items: center;
  gap: 8px;
  border-radius: var(--radius);
  border: 1px solid #b7efca;
  background: #ecfdf3;
  color: var(--green);
  padding: 0 12px;
  box-shadow: var(--shadow);
  font-weight: 800;
}
.toast.show {
  display: inline-flex;
}
@media (max-width: 1080px) {
  .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 760px) {
  .page {
    width: min(100% - 20px, 1240px);
    padding-top: 14px;
  }
  .topbar {
    flex-direction: column;
  }
  .top-stats {
    width: 100%;
    justify-content: stretch;
  }
  .stat {
    flex: 1 1 30%;
    min-width: 92px;
  }
  .toolbar {
    grid-template-columns: 1fr;
  }
  .registry-head,
  .detail-head {
    padding: 12px;
    align-items: flex-start;
  }
  .detail-head {
    flex-direction: column;
  }
  .detail-actions {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .metric-grid,
  .info-grid,
  .form-grid {
    grid-template-columns: 1fr;
  }
  .field.full,
  .info-item.full {
    grid-column: auto;
  }
  .modal {
    padding: 10px;
    align-items: flex-end;
  }
  .modal-box {
    max-height: calc(100vh - 20px);
  }
}
</style>
</head>
<body>
<main class="page">
  <header class="topbar">
    <div class="title-block">
      <h1>ทะเบียนเครื่องมือ</h1>
      <p>Table view เป็นหลัก กดแถวเพื่อดูรายละเอียดเครื่องมือกลางจอ</p>
    </div>
    <div class="top-stats" aria-label="สรุปรายการเครื่องมือ">
      <div class="stat"><span>ทั้งหมด</span><strong id="statTotal">0</strong></div>
      <div class="stat"><span>เกินกำหนด</span><strong id="statOver" style="color:var(--red)">0</strong></div>
      <div class="stat"><span>ใกล้ครบ</span><strong id="statWarn" style="color:var(--amber)">0</strong></div>
      <div class="stat"><span>ปกติ</span><strong id="statOk" style="color:var(--green)">0</strong></div>
    </div>
  </header>

  <section class="toolbar" aria-label="ตัวกรองรายการ">
    <label class="searchbox" for="searchInput">
      <i class="ti ti-search"></i>
      <input id="searchInput" type="search" placeholder="ค้นหา ID.No., CERT., เครื่องมือ, หน่วยงาน">
    </label>
    <select id="statusFilter" class="select" aria-label="กรองสถานะ">
      <option value="">สถานะทั้งหมด</option>
      <option value="over">เกินกำหนด</option>
      <option value="warn">ใกล้ครบ</option>
      <option value="ok">ปกติ</option>
    </select>
  </section>

  <nav id="categoryStrip" class="category-strip" aria-label="หมวดเครื่องมือ"></nav>

  <section class="workspace">
    <section class="registry" aria-label="รายการเครื่องมือ">
      <div class="registry-head">
        <div>
          <h2>รายการเครื่องมือ</h2>
          <div class="muted" id="registryCaption">-</div>
        </div>
        <span class="count-label" id="resultCount">0 รายการ</span>
      </div>
      <div id="tableView" class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>เครื่องมือ</th>
              <th>ID.No. / CERT.</th>
              <th>หมวด</th>
              <th>หน่วยงาน</th>
              <th>วันที่สอบเทียบ</th>
              <th>ครบกำหนด</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </section>
</main>

<input class="file-input" id="fileInput" type="file" multiple>

<div class="modal" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="detailModalTitle">
  <div class="modal-box detail-modal-box">
    <div class="modal-head">
      <h3 id="detailModalTitle">ข้อมูลเครื่องมือ</h3>
      <button class="btn ghost" type="button" id="closeDetail"><i class="ti ti-x"></i>ปิด</button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
  </div>
</div>

<div class="modal" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editTitle">
  <form class="modal-box" id="editForm">
    <div class="modal-head">
      <h3 id="editTitle">แก้ไขเครื่องมือ</h3>
      <button class="btn ghost" type="button" id="closeEdit"><i class="ti ti-x"></i>ปิด</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field">
          <label for="fType">ประเภทเครื่องมือ</label>
          <select id="fType" name="instrument_type">
            <option value="มวล/น้ำหนัก (Mass/Weight)">มวล/น้ำหนัก (Mass/Weight)</option>
            <option value="อุณหภูมิ/ความชื้น (Temperature/Humidity)">อุณหภูมิ/ความชื้น (Temperature/Humidity)</option>
            <option value="ความยาว/มิติ (Length/Dimension)">ความยาว/มิติ (Length/Dimension)</option>
            <option value="ความดัน/สุญญากาศ (Pressure/Vacuum)">ความดัน/สุญญากาศ (Pressure/Vacuum)</option>
            <option value="การไหล/ปริมาตร (Flow/Volume)">การไหล/ปริมาตร (Flow/Volume)</option>
          </select>
        </div>
        <div class="field">
          <label for="fName">ชื่อเครื่องมือ</label>
          <input id="fName" name="instrument_name" type="text">
        </div>
        <div class="field">
          <label for="fBrand">ยี่ห้อ / รุ่น</label>
          <input id="fBrand" name="brand" type="text">
        </div>
        <div class="field">
          <label for="fRange">Range</label>
          <input id="fRange" name="range_val" type="text">
        </div>
        <div class="field">
          <label for="fTolerance">Tolerance (±)</label>
          <input id="fTolerance" name="tolerance" type="text">
        </div>
        <div class="field">
          <label for="fSerial">S/N</label>
          <input id="fSerial" name="serial_no" type="text">
        </div>
        <div class="field">

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getCode(type) {
  return categoryCodes[type] || ['-', 'Other', 'ti-tool'];
}

function statusOf(item) {
  if (!item.due_date) return { key: 'ok', label: 'ปกติ', days: null };
  const due = new Date(item.due_date + 'T00:00:00');
  const diff = Math.round((due - today) / 86400000);
  if (diff < 0) return { key: 'over', label: 'เกินกำหนด', days: diff };
  if (diff <= 30) return { key: 'warn', label: 'ใกล้ครบ', days: diff };
  return { key: 'ok', label: 'ปกติ', days: diff };
}

function formatDate(value) {
  if (!value) return '–';
  return new Date(value + 'T00:00:00').toLocaleDateString('th-TH', {
    day: 'numeric',
    month: 'short',
    year: '2-digit',
  });
}

function formatDateFull(value) {
  if (!value) return '–';
  const date = new Date(value + 'T00:00:00');
  const months = ['ม.ค', 'ก.พ', 'มี.ค', 'เม.ย', 'พ.ค', 'มิ.ย', 'ก.ค', 'ส.ค', 'ก.ย', 'ต.ค', 'พ.ย', 'ธ.ค'];
  return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543}`;
}

function formatDateTime(value) {
  if (!value) return '–';
  return new Date(value).toLocaleString('th-TH', {
    day: '2-digit',
    month: 'short',
    year: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
  });
}

function dueText(item) {
  const st = statusOf(item);
  if (st.days === null) return '–';
  if (st.days < 0) return `เกิน ${Math.abs(st.days)} วัน`;
  if (st.days === 0) return 'วันนี้';
  return `อีก ${st.days} วัน`;
}

function dueDateWithDays(item) {
  const st = statusOf(item);
  if (!item.due_date) return '–';
  if (st.days === null) return formatDateFull(item.due_date);
  if (st.days < 0) return `${formatDateFull(item.due_date)} (เกิน ${Math.abs(st.days)} วัน)`;
  if (st.days === 0) return `${formatDateFull(item.due_date)} (วันนี้)`;
  return `${formatDateFull(item.due_date)} (อีก ${st.days} วัน)`;
}

function filteredRows() {
  const q = byId('searchInput').value.trim().toLowerCase();
  const status = byId('statusFilter').value;
  return instruments.filter(item => {
    if (activeCategory && item.instrument_type !== activeCategory) return false;
    if (status && statusOf(item).key !== status) return false;
    if (!q) return true;
    return [
      item.instrument_type,
      item.instrument_name,
      item.brand,
      item.id_code,
      item.cert_no,
      item.serial_no,
      item.department,
      item.machine_name,
      item.location,
    ].some(value => String(value || '').toLowerCase().includes(q));
  });
}

function renderStats() {

  byId('statTotal').textContent = instruments.length.toLocaleString();
  byId('statOver').textContent = counts.over.toLocaleString();
  byId('statWarn').textContent = counts.warn.toLocaleString();
  byId('statOk').textContent = counts.ok.toLocaleString();
}

function renderCategories() {

  const allButton = `<button class="cat-pill ${activeCategory ? '' : 'active'}" data-type="">

  </button>`;
  const typeButtons = Object.entries(totals).map(([type, count]) => {
    const [code, label] = getCode(type);
    return `<button class="cat-pill ${activeCategory === type ? 'active' : ''}" data-type="${escapeHtml(type)}">
      <span>${escapeHtml(code)} ${escapeHtml(label)}</span><strong>${count}</strong>
    </button>`;
  }).join('');
  byId('categoryStrip').innerHTML = allButton + typeButtons;
}

        <div class="metric"><span>วันครบกำหนด</span><strong>${escapeHtml(dueDateWithDays(item))}</strong></div>
      </div>

      <div class="section-title">รายละเอียดเครื่องมือ</div>
      <div class="info-grid">
        ${detailItem('ประเภทเครื่องมือ', item.instrument_type)}
        ${detailItem('ชื่อเครื่องจักร', item.machine_name)}
        ${detailItem('เครื่องมือ', item.instrument_name)}
        ${detailItem('ยี่ห้อ', item.brand)}
        ${detailItem('Range', item.range_val)}
        ${detailItem('Serial No.', item.serial_no)}
        ${detailItem('Tolerance (±)', item.tolerance)}
        ${detailItem('หน่วยงาน', item.department)}
        ${detailItem('ความถี่สอบเทียบ', item.cal_frequency)}
        ${detailItem('ภายใน/ภายนอก', item.cal_type || '–')}
        ${detailItem('Remark', item.remark || '–', true)}
      </div>

      <div class="section-title">
        <span>ไฟล์ใบรับรอง</span>
        <button class="btn ghost" id="addFileSmall" type="button"><i class="ti ti-upload"></i>เพิ่มไฟล์</button>
      </div>
      <div class="file-list">${renderFiles(item)}</div>

      <div class="section-title">Audit Log</div>
      <div class="audit-list">${renderAudit(item)}</div>
    </div>
  `;
}

function openDetailModal(id) {
  selectedId = id;
  renderRegistry();
  renderDetailModal();
  byId('detailModal').classList.add('open');
}

function closeDetailModal() {
  byId('detailModal').classList.remove('open');
}

function refreshOpenDetail() {
  if (byId('detailModal').classList.contains('open')) renderDetailModal();
}

function addAudit(instrumentId, action, changes) {
  auditLogs.unshift({
    instrument_id: instrumentId,
    username: 'Administrator',
    action,
    created_at: new Date().toISOString(),
    changes,
  });
}

function openEditModal(id) {
  const item = instruments.find(row => row.id === id);
  if (!item) return;
  editingId = id;
  byId('fType').value = item.instrument_type;
  byId('fName').value = item.instrument_name;
  byId('fBrand').value = item.brand;
  byId('fRange').value = item.range_val;
  byId('fTolerance').value = item.tolerance;
  byId('fSerial').value = item.serial_no;
  byId('fDepartment').value = item.department;
  byId('fIdCode').value = item.id_code;
  byId('fCert').value = item.cert_no;
  byId('fCalDate').value = item.cal_date;
  byId('fDueDate').value = item.due_date;
  byId('fFrequency').value = item.cal_frequency;
  byId('fCalType').value = item.cal_type;
  byId('fMachine').value = item.machine_name;
  byId('fLocation').value = item.location;
  byId('fRemark').value = item.remark;
  byId('editModal').classList.add('open');
}

function closeEditModal() {
  byId('editModal').classList.remove('open');
  editingId = null;
}

function saveEdit(event) {
  event.preventDefault();
  const item = instruments.find(row => row.id === editingId);
  if (!item) return;
  const form = new FormData(byId('editForm'));
  const labels = {
    instrument_type: 'ประเภท',
    instrument_name: 'เครื่องมือ',
    brand: 'ยี่ห้อ',
    range_val: 'Range',
    tolerance: 'Tolerance',
    serial_no: 'S/N',
    department: 'หน่วยงาน',
    id_code: 'ID.No.',
    cert_no: 'CERT.',
    cal_date: 'วันสอบเทียบ',
    due_date: 'วันครบกำหนด',
    cal_frequency: 'ความถี่',
    cal_type: 'ภายใน/ภายนอก',
    machine_name: 'ชื่อเครื่องจักร',
    location: 'สถานที่',
    remark: 'Remark',
  };
  const next = {};
  Object.keys(labels).forEach(key => {
    next[key] = String(form.get(key) || '').trim();
  });
  const changes = {};
  Object.entries(next).forEach(([key, value]) => {
    const oldValue = String(item[key] || '');
    if (oldValue !== value) changes[labels[key]] = { from: oldValue || '–', to: value || '–' };
  });
  Object.assign(item, next);
  if (Object.keys(changes).length) addAudit(item.id, 'แก้ไข', changes);
  closeEditModal();
  renderAll();
  refreshOpenDetail();
  showToast('บันทึกตัวอย่างแล้ว');
}

function addFiles(files) {
  const item = instruments.find(row => row.id === selectedId);
  if (!item || !files.length) return;
  const todayText = today.toISOString().slice(0, 10);
  const names = [];
  Array.from(files).forEach(file => {
    const size = file.size ? `${Math.max(1, Math.round(file.size / 1024)).toLocaleString()} KB` : '–';
    item.files.push({ name: file.name, size, date: todayText });
    names.push(file.name);
  });
  addAudit(item.id, 'อัพโหลดไฟล์', { ไฟล์: { from: '–', to: names.join(', ') } });
  byId('fileInput').value = '';
  renderAll();
  refreshOpenDetail();
  showToast('เพิ่มไฟล์ในตัวอย่างแล้ว');
}

function showToast(message) {
  byId('toastText').textContent = message;
  byId('toast').classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => byId('toast').classList.remove('show'), 1800);
}

function renderAll() {
  renderStats();
  renderCategories();
  renderRegistry();
}

document.addEventListener('click', event => {
  const row = event.target.closest('tbody tr[data-id]');
  const cat = event.target.closest('.cat-pill');
  if (row) {
    openDetailModal(Number(row.dataset.id));
  }
  if (cat) {
    activeCategory = cat.dataset.type || '';
    renderAll();
  }
  if (event.target.closest('#editSelected')) openEditModal(selectedId);
  if (event.target.closest('#addFileBtn') || event.target.closest('#addFileSmall')) byId('fileInput').click();
});

byId('searchInput').addEventListener('input', renderRegistry);
byId('statusFilter').addEventListener('change', renderRegistry);
byId('fileInput').addEventListener('change', event => addFiles(event.target.files));
byId('editForm').addEventListener('submit', saveEdit);
byId('closeEdit').addEventListener('click', closeEditModal);
byId('cancelEdit').addEventListener('click', closeEditModal);
byId('closeDetail').addEventListener('click', closeDetailModal);
byId('detailModal').addEventListener('click', event => {
  if (event.target.id === 'detailModal') closeDetailModal();
});
byId('editModal').addEventListener('click', event => {
  if (event.target.id === 'editModal') closeEditModal();
});

renderAll();
</script>
</body>
</html>
