<!DOCTYPE html><html><head><meta charset="utf-8"><title>RUNNING</title></head><body>
<pre id="out"></pre><pre id="b64"></pre>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="../js/15-plan-export.js"></script>
<script>
const results = [];
function eq(name, got, want) { results.push((String(got) === String(want) ? 'PASS ' : 'FAIL ') + name + ' | got=' + got + ' want=' + want); }
function ok(name, cond) { results.push((cond ? 'PASS ' : 'FAIL ') + name); }
function finish() {
  const fails = results.filter(r => r.indexOf('FAIL') === 0).length;
  document.getElementById('out').textContent = results.join('\n');
  document.title = fails ? ('FAIL ' + fails) : 'ALLPASS';
}
async function main() {
  eq('colLetter F', frmColLetter(6), 'F');
  eq('colLetter Z', frmColLetter(26), 'Z');
  eq('colLetter AA', frmColLetter(27), 'AA');
  eq('colLetter AJ', frmColLetter(36), 'AJ');
  eq('colLetter AQ', frmColLetter(43), 'AQ');
  eq('serial 26/02/2026', frmDateSerial('2026-02-26'), 46079);
  eq('serial 28/10/2026', frmDateSerial('2026-10-28'), 46323);
  eq('serial null', frmDateSerial(null), null);
  eq('month name', frmMonthName(2), 'February');
  eq('escape', frmEscapeXml('a<b>&"c'), 'a&lt;b&gt;&amp;&quot;c');

  const item = { id_code: 'WRM1BB05-WI01', instrument_name: 'BALANCE  30  kg', location: 'B.4/2', due_date: '2026-02-26' };
  const xml = frmBuildItemRows(item, 1, 10, 2, true);
  ok('row attrs', xml.includes('<row r="10" spans="1:44" ht="21.75" customHeight="1">'));
  ok('item no (first-row style)', xml.includes('<c r="A10" s="72"><v>1</v></c>'));
  ok('name inline', xml.includes('<c r="B10" s="21" t="inlineStr"><is><t xml:space="preserve">BALANCE  30  kg</t></is></c>'));
  ok('id code', xml.includes('<c r="C10" s="22" t="inlineStr"><is><t xml:space="preserve">WRM1BB05-WI01</t></is></c>'));
  ok('due serial', xml.includes('<c r="E10" s="74"><v>46079</v></c>'));
  ok('top day25 plain (s=76)', xml.includes('<c r="AD10" s="76"/>'));
  ok('top day26 blue (s=179)', xml.includes('<c r="AE10" s="179"/>'));
  ok('top day31 blue (s=180)', xml.includes('<c r="AJ10" s="180"/>'));
  ok('bottom day1 num (s=178)', xml.includes('<c r="F11" s="178"><v>2</v></c>'));
  ok('bottom day26 num (s=179)', xml.includes('<c r="AE11" s="179"><v>2</v></c>'));
  ok('bottom day27 plain (s=83)', xml.includes('<c r="AF11" s="83"/>'));
  ok('bottom day31 plain (s=84)', xml.includes('<c r="AJ11" s="84"/>'));
  ok('eib cols first row', xml.includes('<c r="AK10" s="75"/><c r="AL10" s="78"/><c r="AM10" s="76"/><c r="AN10" s="77"/><c r="AO10" s="77"/><c r="AP10" s="76"/><c r="AQ10" s="79"/>'));
  ok('eib cols bottom row (generic)', xml.includes('<c r="AK11" s="82"/><c r="AL11" s="85"/><c r="AM11" s="83"/><c r="AN11" s="84"/><c r="AO11" s="84"/><c r="AP11" s="83"/><c r="AQ11" s="86"/>'));

  const xml2 = frmBuildItemRows({ id_code: 'X', instrument_name: 'Y', location: '', due_date: null }, 2, 12, 2, false);
  ok('no-due: E empty (generic style)', xml2.includes('<c r="E12" s="81"/>'));
  ok('no-due: no blue', xml2.indexOf('s="178"') < 0 && xml2.indexOf('s="179"') < 0 && xml2.indexOf('s="180"') < 0);
  ok('no-due: top day1 plain (s=82)', xml2.includes('<c r="F12" s="82"/>'));
  ok('no-due: bottom day1 plain (s=82)', xml2.includes('<c r="F13" s="82"/>'));

  const sig = frmBuildSignatureRows(30);
  ok('sig row1 attrs', sig.includes('<row r="30" spans="1:43" ht="33" customHeight="1">'));
  ok('sig row2 attrs', sig.includes('<row r="31" spans="1:43" ht="19.5" customHeight="1" thickBot="1">'));
  ok('sig prepared text', sig.includes('Prepared by :___________(EIB)'));
  ok('sig owner text', sig.includes('The owner accepts the work by'));
  ok('sig styles', sig.includes('<c r="A30" s="8"') && sig.includes('<c r="AQ31" s="122"/>'));

  const closing = frmBuildClosingRow(26);
  ok('closing row attrs', closing.includes('<row r="26" spans="1:44" ht="21.75" customHeight="1">'));
  ok('closing styles', closing.includes('<c r="A26" s="95"/>') && closing.includes('<c r="F26" s="96"/>') && closing.includes('<c r="AJ26" s="98"/>') && closing.includes('<c r="AQ26" s="100"/>'));

  // 11 เครื่อง/บล็อก (scale=73 พอดี 1 หน้า วัดจริงด้วย Excel COM 2026-07-20): 14 เครื่อง = บล็อกแรก 11 (แถว 10-31) + ปิด 32 + เซ็น 33-34, ที่เหลือ 3 (35-40) + ปิด 41 + เซ็น 42-43
  const items = []; for (let i = 0; i < 14; i++) items.push(item);
  const built = frmBuildSheetRows(items, 2);
  eq('lastRow (14 items)', built.lastRow, 43);
  ok('sig after 11th', built.xml.includes('<row r="33" spans="1:43"'));
  ok('item12 at r35 (first-row style ของหน้า 2)', built.xml.includes('<c r="A35" s="72"><v>12</v></c>'));
  eq('merges', built.merges.join(' '), 'AK33:AQ33 AK34:AQ34 AK42:AQ42 AK43:AQ43');
  eq('breaks (14 items) หลังบล็อกแรก', built.breaks.join(' '), '34');
  const built11 = frmBuildSheetRows(items.slice(0, 11), 2);
  eq('lastRow (11 items, sig once)', built11.lastRow, 34);
  eq('merges (11 items)', built11.merges.join(' '), 'AK33:AQ33 AK34:AQ34');
  eq('breaks (11 items) ไม่มี', built11.breaks.length, 0);

  // 1 แผน = 1 หน่วยงาน (ID CODE 4 ตัวแรก) + 1 ประเภทเครื่องมือ — WRM1/WRM2 ต้องแยกกัน
  eq('unitCode WRM1', frmUnitCode({ id_code: 'WRM1BB05-WI01' }), 'WRM1');
  eq('unitCode PDB4', frmUnitCode({ id_code: 'PDB4CE14' }), 'PDB4');
  eq('unitCode fallback dept', frmUnitCode({ id_code: '', department: 'PMT1' }), 'PMT1');
  eq('unitCode none', frmUnitCode({}), 'ไม่ระบุ');
  const groups = frmBuildGroups([
    { id_code: 'WRM1BB05-WI01', instrument_type: 'เครื่องชั่ง (Electronic Balance)', due_date: '2026-02-26', department: 'General Raw Material:WRM1', division: 'Warehouse - Raw Material' },
    { id_code: 'WRM2BB01-WI01', instrument_type: 'เครื่องชั่ง (Electronic Balance)' },
    { id_code: 'WRM1TM01-WI01', instrument_type: 'เครื่องวัดอุณหภูมิ' },
    { instrument_type: 'เครื่องชั่ง (Electronic Balance)' }
  ]);
  eq('group count (แยก WRM1/WRM2 + แยกประเภท)', groups.length, 4);
  eq('group units', groups.map(x => x.unitCode).join(','), 'WRM1,WRM1,WRM2,ไม่ระบุ');
  ok('WRM1 สองประเภทแยกกลุ่ม', groups[0].typeName !== groups[1].typeName);
  eq('unit header จากทะเบียน', groups.filter(x => x.typeName.indexOf('ชั่ง') >= 0 && x.unitCode === 'WRM1')[0].header.unit, 'General Raw Material:WRM1');
  eq('unit header fallback = unitCode', groups[2].header.unit, 'WRM2');
  const hd = frmDefaultHeader([
    { due_date: '2026-02-20', instrument_type: 'เครื่องชั่ง (Electronic Balance)', cal_type: 'ภายใน', department: 'WRM1', division: 'Warehouse - Raw Material' },
    { due_date: '2026-02-25', instrument_type: 'เครื่องชั่ง (Electronic Balance)', cal_type: 'ภายใน', department: 'WRM1', division: 'Warehouse - Raw Material' },
    { due_date: '2026-03-01', instrument_type: 'อื่นๆ', cal_type: 'ภายนอก', department: 'WRM1', division: 'Warehouse - Raw Material' }]);
  eq('hd month', hd.monthNum, 2);
  eq('hd year', hd.year, 2026);
  eq('hd group', hd.group, 'BALANCE');
  eq('hd unit', hd.unit, 'WRM1');
  eq('hd section', hd.section, 'Warehouse - Raw Material');
  ok('hd internal', hd.internal === true && hd.external === false);

  // override รายเครื่อง (bar_start/bar_end/month_num) + name fallback
  const xo = frmBuildItemRows({ id_code: 'X', name: 'Y2', location: '', due_date: '2026-02-26', bar_start: 5, bar_end: 12, month_num: 3 }, 3, 14, 2, false);
  ok('ovr: name fallback', xo.includes('<t xml:space="preserve">Y2</t>'));
  ok('ovr: due ยังลง E', xo.includes('<c r="E14" s="81"><v>46079</v></c>'));
  ok('ovr: day4 bottom plain', xo.includes('<c r="I15" s="83"/>'));
  ok('ovr: day5 num=3', xo.includes('<c r="J15" s="179"><v>3</v></c>'));
  ok('ovr: day12 num=3', xo.includes('<c r="Q15" s="179"><v>3</v></c>'));
  ok('ovr: day13 bottom plain', xo.includes('<c r="R15" s="83"/>'));
  ok('ovr: top day11 plain', xo.includes('<c r="P14" s="83"/>'));
  ok('ovr: top day12 blue', xo.includes('<c r="Q14" s="179"/>'));
  eq('clickRange first', JSON.stringify(frmClickRange({ pending: null }, 12)), '{"pending":12}');
  eq('clickRange second', JSON.stringify(frmClickRange({ pending: 12 }, 5)), '{"start":5,"end":12,"pending":null}');
  eq('clickRange same-day', JSON.stringify(frmClickRange({ pending: 7 }, 7)), '{"start":7,"end":7,"pending":null}');
  const itf = frmItemFromInstrument({ id: 9, id_code: 'WRM1BB05-WI01', instrument_name: 'BALANCE 30 kg', location: 'B.4/2', due_date: '2026-02-26' }, 2);
  eq('itemFrom: bar', itf.bar_start + '-' + itf.bar_end, '1-26');
  eq('itemFrom: month', itf.month_num, 2);
  eq('itemFrom: id', itf.instrument_id, 9);
  const itn = frmItemFromInstrument({ id: 1, id_code: 'A1X', instrument_name: 'B', location: '', due_date: null }, 2);
  eq('itemFrom: no due bar', itn.bar_start + '-' + itn.bar_end, '0-0');

  // ---- template render (ต้องรันด้วย --allow-file-access-from-files) ----
  try {
    const buf = await new Promise((res, rej) => {
      const x = new XMLHttpRequest();
      x.open('GET', '../assets/frm-eib04-template.xlsx');
      x.responseType = 'arraybuffer';
      x.onload = () => res(x.response); x.onerror = () => rej(new Error('xhr template'));
      x.send();
    });
    const header = { monthNum: 2, year: 2026, group: 'BALANCE', unit: 'General Raw Material:WRM1',
      section: 'Warehouse - Raw Material', internal: true, external: false, drug: false, cosmetic: true, otherText: '' };
    const blob = await frmRenderTemplate(buf, header, items); // 14 ชิ้นจาก block ก่อนหน้า
    const z2 = await JSZip.loadAsync(blob);
    const sh = await z2.file('xl/worksheets/sheet1.xml').async('string');
    const dr = await z2.file('xl/drawings/drawing1.xml').async('string');
    ok('render: rows in sheetData', sh.includes('<c r="A10" s="72"><v>1</v></c>') && sh.includes('<row r="43"'));
    ok('render: dimension', sh.includes('<dimension ref="A1:AR43"/>'));
    ok('render: merge added', sh.includes('<mergeCell ref="AK33:AQ33"/>') && sh.includes('<mergeCell ref="AK43:AQ43"/>'));
    ok('render: merge count', /<mergeCells count="(\d+)">/.exec(sh) && ((sh.match(/<mergeCell /g) || []).length === Number(/<mergeCells count="(\d+)">/.exec(sh)[1])));
    ok('render: no token left (sheet)', sh.indexOf('{{') < 0);
    ok('render: no token left (drawing)', dr.indexOf('{{') < 0);
    ok('render: month/year textbox', dr.includes('<a:t>February</a:t>') && dr.includes('<a:t>2026</a:t>'));
    ok('render: unit/section textbox', dr.includes('<a:t>General Raw Material:WRM1</a:t>') && dr.includes('<a:t>Warehouse - Raw Material</a:t>'));
    const ss = await z2.file('xl/sharedStrings.xml').async('string');
    ok('render: เส้นใต้ยังอยู่ในเซลล์ (sharedStrings)', ss.includes('Month  ____') && ss.includes('หน่วยงาน (Unit) ____'));
    ok('render: chk int/ext', sh.includes('☑ สอบเทียบภายใน') && sh.includes('☐ สอบเทียบภายนอก'));
    ok('render: chk drug/cos', sh.includes('☐ Drug product') && sh.includes('☑ Cosmetic product'));
    ok('render: other blank', sh.includes('☐ Other ____'));
    ok('render: row break หลังบล็อกแรก', sh.includes('<rowBreaks count="1" manualBreakCount="1"><brk id="34" max="16383" man="1"/></rowBreaks>'));
    // base64 สำหรับ E2E (Task 5)
    document.getElementById('b64').textContent = await new Promise(res => {
      const fr = new FileReader(); fr.onload = () => res(String(fr.result).split(',')[1]); fr.readAsDataURL(blob);
    });
  } catch (e) { results.push('FAIL render ' + (e && e.message || e)); }

  finish();
}
main().catch(e => { results.push('FAIL exception ' + e); finish(); });
</script></body></html>
