/* ===== print setup ===== */
@page { size: A4 portrait; margin: 0; }
@page land { size: A4 landscape; margin: 0; }
* { box-sizing: border-box; }
/* ฟอนต์ทั้งชุดเอกสาร: หัวข้อ CordiaUPC 16 หนา (--fl) / ข้อมูล Cordia New 14 (--fd) ไม่มีตัวเอียง */
:root { --fd: 14pt; --fl: 16pt; --ffd: "Cordia New", "CordiaUPC", "Sarabun", Arial, sans-serif; --ffl: "CordiaUPC", "Cordia New", "Sarabun", Arial, sans-serif; }
.no-cordia { --fd: 12px; --fl: 14px; --ffd: Arial, "Sarabun", sans-serif; --ffl: Arial, "Sarabun", sans-serif; }
body { margin: 0; background: #e8edf2; font-family: Arial, "Sarabun", sans-serif; font-size: 11.5px; color: #111; }
.sheet {
  font-family: var(--ffd); font-size: var(--fd);
  width: 210mm; min-height: 296mm; margin: 14px auto; padding: 11mm 13mm 9mm;
  background: #fff; box-shadow: 0 6px 24px rgba(0,0,0,.18); position: relative;
  page-break-after: always; overflow: hidden;
}
.sheet.land { width: 297mm; min-height: 209mm; page: land; }
@media print {
  body { background: #fff; }
  .sheet { margin: 0; box-shadow: none; }
  .toolbar { display: none !important; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
.toolbar {
  position: sticky; top: 0; z-index: 50; display: flex; gap: 10px; align-items: center;
  background: #102337; color: #fff; padding: 10px 16px; font-family: "Sarabun", sans-serif;
}
.toolbar button { background: #0788a6; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-weight: 700; font-family: inherit; cursor: pointer; }
.toolbar span { font-size: 12px; opacity: .85; }
/* ===== shared ===== */
.it { font-style: normal; }
.b { font-weight: 700; }
.ctr { text-align: center; }
.rt { text-align: right; }
.u { text-decoration: underline; }
.small { font-size: 10px; }
.thfont { font-family: "Sarabun", sans-serif; }
table { border-collapse: collapse; }
.bx td, .bx th { border: 1px solid #111; padding: 2px 6px; }
.footrow { position: absolute; bottom: 8mm; left: 13mm; right: 13mm; display: flex; justify-content: space-between; align-items: center; font-size: var(--fd); }
.conf { border: 1px solid #111; padding: 1px 8px; font-size: .8em; }
.fill { color: #1a1aa6; font-weight: 600; } /* ค่าที่ระบบเติม (โทนน้ำเงินแบบฟอร์มจริง) */
.chk { display: inline-block; width: 12px; height: 12px; border: 1.2px solid #111; vertical-align: -2px; text-align: center; line-height: 11px; font-size: 11px; margin-right: 4px; }
/* ===== cert cover (FRM-CAL54 (TP) Rev.01) =====
   ระยะทั้งหมดวัดจากต้นฉบับ PDF: กรอบหัวเรื่อง 5–42.2mm (ขอบ 8mm),
   เส้นคั่น 90.3mm / 257.5mm, ลายเซ็น 211.7mm, footer ~286mm
   ฟอนต์ตามไฟล์ Excel ที่ออกแบบ: เนื้อความ Cordia New 14pt,
   NAME OF CLIENT / EQUIPMENT 16pt หนา, CALIBRATED/APPROVED BY 14pt หนา,
   DATE OF APPROVAL CordiaUPC 16pt หนา, หัวเรื่อง Angsana New 40pt หนา
   (เครื่องที่ไม่มีฟอนต์ตระกูล Cordia จะสลับเป็น Arial ขนาดเทียบเท่าอัตโนมัติ) */
.sheet.cover { padding: 5mm 8.3mm 7mm; font-family: "Cordia New", "CordiaUPC", Arial, sans-serif; font-size: 14pt; }
.no-cordia .sheet.cover { font-family: Arial, sans-serif; font-size: 12.5px; }
.cv-title { border: 2.5px solid #111; height: 37.2mm; padding: 5mm 8mm 1.5mm; display: flex; flex-direction: column; }
.cv-title h1 { margin: 0; flex: 1; text-align: center; white-space: nowrap; font-size: 30pt; font-weight: 700; letter-spacing: 1px; font-family: "Constantia", "Times New Roman", serif; }
/* หัวเรื่องใช้ Constantia 30pt; Constantia เป็นฟอนต์มาตรฐาน Windows (ยังไม่ฝังในไฟล์) เครื่องที่ไม่มีจะ fallback เป็น Times New Roman */
.cv-certno { text-align: right; }
.cv-head { padding-left: 52mm; margin: 2mm 0 0; min-height: 49mm; } /* เผื่อที่อยู่แล็บ 3 บรรทัด + ให้เส้นคั่นลงต่ำกว่าโลโก้/DATE OF ISSUE */
.no-cordia .cv-head { font-size: 12.5px; }
/* บล็อกโลโก้ตรึงตำแหน่งแยก ไม่ดันความสูงแถวข้อความฝั่งขวา */
.cv-issued { position: absolute; top: 42.8mm; left: 8.3mm; width: 50mm; }
.cv-issued > div { position: absolute; top: 0; left: 0; } /* ป้าย ISSUED BY: ไม่ดันโลโก้ลง */
.cv-issued .cv-circ { display: block; margin: 1mm auto 0; }
.cv-nac { position: absolute; top: 43.5mm; right: 25mm; width: 25mm; } /* กึ่งกลางเหนือ DATE OF ISSUE */
.cv-lab { padding-right: 28mm; }
.cv-lab div, .cv-issue-line { line-height: 7.4mm; }
.cv-issue-line { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; white-space: nowrap; }
.cv-rule { border-top: 2.5px solid #111; margin: 0 0 3mm; }
.cv-row { display: grid; grid-template-columns: 60mm 1fr; line-height: 6.35mm; }
.cv-row .fill { white-space: nowrap; } /* ค่าล้นช่องโดยไม่ตัดบรรทัด แบบเดียวกับ Excel — จำนวนบรรทัดคงที่ตามฟอร์ม */
.cover .fill { font-style: normal; font-family: inherit; } /* ค่าสีฟ้าตัวตรง ฟอนต์เดียวกับเนื้อความทั้งใบ */
.cv-sig-lbl { font-family: "CordiaUPC", "Cordia New", Arial, sans-serif; font-size: 16pt; } /* เข้มเท่าหัวข้อแถวอื่น */
.no-cordia .cv-sig-lbl { font-family: Arial, sans-serif; font-size: 14px; }
/* หัวข้อหน้าแถวทุกตัว CordiaUPC 16 ตัวหนา ชิดซ้ายเท่ากันหมด — ค่าสีฟ้า (.fill) เป็น Cordia New 14 ตาม body */
.cv-row > span:first-child { font-family: "CordiaUPC", "Cordia New", Arial, sans-serif; font-size: 16pt; font-weight: 700; font-style: normal; }
.no-cordia .cv-row > span:first-child { font-family: Arial, sans-serif; font-size: 14px; }

    { nominal: 1000, desc: '1000',      conv: 999.9978,   U: 1.60, reads: [1000, 1000, 1000] },
    { nominal: 2000, desc: '2000',      conv: 1999.9974,  U: 3.00, reads: [2000, 2000, 2000] },
    { nominal: 3000, desc: '2000+1000', conv: 2999.9952,  U: 4.60, reads: [2999.99, 2999.99, 2999.99] },
  ],
  ecc:  { wt: 1000, positions: ['Middle (1)', 'Front left (2)', 'Back left (3)', 'Back right ( 4)', 'Front right ( 5 )'], reads: [1000, 1000, 1000.01, 999.99, 999.99], pan: 0 },
  tare: { wt: 1000, checks: [[500, 500], [2000, 2000]] },
  signers: { tech_mgr: 'PRASERT    PLAINPRASERT', director: 'DR.WANLOP   CHUSATTAYANOND', approver: 'tech_mgr' },
};

// ====== คำนวณ (สูตรเดียวกับ FRM-CAL92 / mockup) ======
const SQ3 = 1.7321;
function stdev(a) { if (a.length < 2) return 0; const m = a.reduce((x,y)=>x+y,0)/a.length; return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1)); }
const repStd = stdev(CAL.repeat.reads);
const repAvg = CAL.repeat.reads.reduce((a,b)=>a+b,0)/CAL.repeat.reads.length;
let repMaxDiff = 0; CAL.repeat.reads.forEach((v,i)=>{ if(i>0) repMaxDiff = Math.max(repMaxDiff, Math.abs(v-CAL.repeat.reads[i-1])); });
const uR_mg = (repStd / 1.732) * 1000;
const d_mg = (CAL.resolution * 1000) / 2;

function budget(nominal_g, U_std_mg) {
  const uWS = U_std_mg / 2, uDS = U_std_mg / SQ3, udo = d_mg / SQ3, ud = d_mg / SQ3;
  const ab = nominal_g * 1000 / 1e6;            // 1 ppm (mg)
  const uAb = ab / SQ3, uR = uR_mg;
  const uc = Math.sqrt(uWS**2 + uDS**2 + udo**2 + ud**2 + uAb**2 + uR**2);
  const U = uc * 2;
  const Ufinal = U >= 8.5 ? Math.ceil(U) : U;   // ปัดขึ้นเป็น mg เต็มตามแนวทางในไฟล์
  return { uWS, uDS, udo, ud, ab, uAb, uR, uc, U, Ufinal };
}
// แถว ZERO + ทุกจุด
const ROWS = [{ nominal: 0, desc: '0', conv: 0, U: 0, reads: [0,0,0], zero: true }, ...CAL.points].map(p => {
  const avg = p.reads.reduce((a,b)=>a+b,0)/p.reads.length;
  const corr = p.conv - avg;
  return { ...p, avg, corr, sd: stdev(p.reads), bud: budget(p.zero ? 0 : p.nominal, p.zero ? 0 : p.U) };
});
// eccentricity: เสมอกันให้ค่าหลังชนะ (ตามใบจริง −0.01)
let eccMax = 0; const eccDiffs = CAL.ecc.reads.map((v,i)=> i===0?0: v-CAL.ecc.reads[0]);
eccDiffs.forEach(dv => { if (Math.abs(dv) >= Math.abs(eccMax) && dv !== 0) eccMax = dv; });

// ====== format helpers ======
const f = (v,d) => { const s = v.toFixed(d); return parseFloat(s) === 0 ? (0).toFixed(d) : s; };
function fmtU(u) { return u < 10 ? u.toFixed(1) : String(Math.round(u)); } // 8.2 / 9.0 / 10 / 12
const MON = ['Jan.','Feb.','Mar.','Apr.','May','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'];
function dCert(s){ const d=new Date(s+'T00:00:00'); return `${String(d.getDate()).padStart(2,'0')}-${MON[d.getMonth()]}-${d.getFullYear()}`; }
function dTH(s){ const p=s.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
const esc = v => String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function chk(on){ return `<span class="chk">${on ? '✓' : '&nbsp;'}</span>`; }

// SVG จานชั่ง 3 แบบ (สี่เหลี่ยม/วงกลม/สามเหลี่ยม)

  const lines = `<line x1="4" y1="4" x2="40" y2="40" stroke="#111" stroke-width=".8"/><line x1="40" y1="4" x2="4" y2="40" stroke="#111" stroke-width=".8"/>`;
  const nums = `<circle cx="22" cy="22" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="22" y="24" font-size="6" text-anchor="middle">1</text>

}

// ====== PAGE: Uncertainty (FRM-CAL92) — 3 บล็อกต่อหน้า ======
function uncBlock(r) {
  const b = r.bud;
  const sym = (m, s) => `${m}<sub>${s}</sub>`;
  const rows = [
    [sym('W','S'), 'calibration of standard weight', f(r.zero?0:r.U,3), 'Normal', '2.0', '1.0', f(b.uWS,4), '∞'],
    [sym('D','S'), 'Drift since last calibration', f(r.zero?0:r.U,3), 'Rectangular', '√3', '1.0', f(b.uDS,4), '∞'],
    ['δI<sub>do</sub>', 'Digital rounding error (at zero)', f(d_mg,3), 'Rectangular', '√3', '1.0', f(b.udo,4), '∞'],
    ['δI<sub>d</sub>', 'Digital rounding error (for indicated value)', f(d_mg,3), 'Rectangular', '√3', '1.0', f(b.ud,4), '∞'],
    [sym('A','b'), `Air buoyancy ( …${r.zero?'…':'1'}… ppm of nominal value)`, f(r.zero?0:b.ab,3), 'Rectangular', '√3', '1.0', f(b.uAb,4), '∞'],
    [sym('I','R'), 'Repeatability of indication', f(uR_mg,3), 'Normal', '1.0', '1.0', f(b.uR,4), String(CAL.repeat.reads.length - 1)],
  ];
  return `<div class="blk">
    <div class="wrow"><span><span class="b">Weight  :</span> &nbsp; ${r.zero ? '0' : r.nominal} &nbsp; g</span></div>
    <table>
      <thead><tr>
        <th style="width:46px">symbol</th><th>Source of uncertainty</th><th style="width:58px">Value<br>± mg</th>
        <th style="width:78px">Probability<br>distribution</th><th style="width:52px">Divisor</th><th style="width:34px">c<sub>i</sub></th>
        <th style="width:62px">u( I<sub>X</sub> )<br>mg</th><th style="width:48px">V<sub>i</sub> or V<sub>eff</sub></th>
      </tr></thead>
      <tbody>
        ${rows.map(c => `<tr><td class="ctr">${c[0]}</td><td>${c[1]}</td><td class="ctr">${c[2]}</td><td class="ctr">${c[3]}</td><td class="ctr">${c[4]}</td><td class="ctr">${c[5]}</td><td class="ctr">${c[6]}</td><td class="ctr">${c[7]}</td></tr>`).join('')}
        <tr><td class="ctr">u( I<sub>X</sub> )</td><td>Combined standard uncertainty</td><td class="shade"></td><td class="ctr">Normal</td><td class="shade"></td><td class="shade"></td><td class="ctr">${f(b.uc,4)}</td><td class="ctr">&gt;500</td></tr>
        <tr><td class="ctr">U</td><td>Expanded uncertainty</td><td class="shade"></td><td class="ctr" style="color:#c00">Normal (k = 2)</td><td class="shade"></td><td class="shade"></td><td class="ctr">${f(b.U,4)}</td><td class="ctr">&gt;500</td></tr>
      </tbody>
    </table>
    <div class="rt" style="padding:3px 60px 0 0;font-size:12px"><span class="b">${fmtU(b.Ufinal)}</span> &nbsp;mg</div>
  </div>`;
}

}
