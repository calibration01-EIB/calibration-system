<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Print Template — 26B232-0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
/* ===== print setup ===== */
@page { size: A4 portrait; margin: 0; }
@page land { size: A4 landscape; margin: 0; }
* { box-sizing: border-box; }
body { margin: 0; background: #e8edf2; font-family: Arial, "Sarabun", sans-serif; font-size: 11.5px; color: #111; }
.sheet {
  width: 210mm; min-height: 296mm; margin: 14px auto; padding: 11mm 13mm 9mm;
  background: #fff; box-shadow: 0 6px 24px rgba(0,0,0,.18); position: relative;
  page-break-after: always; overflow: hidden;
}
.sheet.land { width: 297mm; min-height: 209mm; page: land; }
@media print {
  body { background: #fff; }
  .sheet { margin: 0; box-shadow: none; }
  .toolbar { display: none !important; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
.toolbar {
  position: sticky; top: 0; z-index: 50; display: flex; gap: 10px; align-items: center;
  background: #102337; color: #fff; padding: 10px 16px; font-family: "Sarabun", sans-serif;
}
.toolbar button { background: #0788a6; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-weight: 700; font-family: inherit; cursor: pointer; }
.toolbar span { font-size: 12px; opacity: .85; }
/* ===== shared ===== */
.it { font-style: italic; }
.b { font-weight: 700; }
.ctr { text-align: center; }
.rt { text-align: right; }
.u { text-decoration: underline; }
.small { font-size: 10px; }
.thfont { font-family: "Sarabun", sans-serif; }
table { border-collapse: collapse; }
.bx td, .bx th { border: 1px solid #111; padding: 2px 6px; }
.footrow { position: absolute; bottom: 8mm; left: 13mm; right: 13mm; display: flex; justify-content: space-between; align-items: center; font-size: 10px; }
.conf { border: 1px solid #111; padding: 1px 8px; font-style: italic; font-size: 10px; }
.fill { color: #1a1aa6; font-style: italic; font-weight: 600; } /* ค่าที่ระบบเติม (โทนน้ำเงินแบบฟอร์มจริง) */
.chk { display: inline-block; width: 12px; height: 12px; border: 1.2px solid #111; vertical-align: -2px; text-align: center; line-height: 11px; font-size: 11px; margin-right: 4px; }
/* ===== cert cover ===== */
.cv-title { border: 2.5px solid #111; padding: 26px 18px 8px; margin-top: 4px; }
.cv-title h1 { margin: 0 0 26px; text-align: center; font-size: 30px; font-weight: 400; letter-spacing: 4px; font-family: "Times New Roman", serif; }
.cv-certno { text-align: right; font-size: 11px; padding-bottom: 4px; }
.cv-head { display: grid; grid-template-columns: 150px 1fr 150px; gap: 8px; align-items: center; margin: 16px 0 6px; }
.cv-head img { width: 120px; }
.cv-lab div { padding: 2px 0; }
.cv-rule { border-top: 2.5px solid #111; margin: 8px 0 14px; }
.cv-row { display: grid; grid-template-columns: 200px 1fr; padding: 5px 0; }
.cv-watermark { position: absolute; left: 50%; top: 58%; transform: translate(-50%,-50%); opacity: .12; width: 420px; pointer-events: none; }
.cv-sig { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 36px; }
.cv-foot { border-top: 2px solid #111; margin-top: 28px; padding-top: 6px; font-size: 10.5px; }
/* ===== cert continuation ===== */
.ct { font-style: italic; }
.ct .hd-right { text-align: right; font-size: 11px; }
.ct h4 { margin: 10px 0 4px; font-size: 11.5px; text-decoration: underline; font-weight: 700; }
.ct .kv { display: grid; grid-template-columns: 170px 1fr; padding: 2.5px 0; }
.ct .kv2 { display: grid; grid-template-columns: 56px 170px 1fr; padding: 2.5px 0; }
.ct p { margin: 3px 0; }
.std-tbl th { text-decoration: underline; font-weight: 700; padding: 3px 8px; text-align: center; }
.std-tbl td { padding: 2.5px 8px; text-align: center; }
.dep td, .dep th { border: 1px solid #111; padding: 3.5px 6px; text-align: center; }
/* ===== worksheet (Thai forms) ===== */
.ws { font-family: "Sarabun", sans-serif; font-size: 12px; }
.ws h2 { margin: 0 0 6px; text-align: center; font-size: 14.5px; font-weight: 700; }
.ws .row { display: flex; gap: 6px; align-items: baseline; padding: 1.5px 0; flex-wrap: nowrap; }
.ws .lbl { font-weight: 700; }
.ws .dot { flex: 0 0 auto; }
.ws .fv { border-bottom: 1px dotted #555; min-width: 60px; text-align: center; padding: 0 6px; }
.ws .sec { font-weight: 700; text-decoration: underline; margin-top: 6px; }
.ws table { font-size: 12px; }
/* ===== uncert ===== */
.un { font-family: Arial, "Sarabun", sans-serif; }
.un h3 { margin: 0; text-align: center; font-size: 13.5px; font-family: "Sarabun", sans-serif; }
.un .blk { margin-top: 8px; }
.un table { width: 100%; }
.un td, .un th { border: 1px solid #111; padding: 2px 6px; font-size: 10.8px; }
.un th { font-weight: 400; }
.un .shade { background: #c9c9c9; }
.un .wrow { display: flex; justify-content: space-between; padding: 5px 2px 2px; font-size: 12px; }
</style>
</head>
<body>
<div class="toolbar thfont">
  <button onclick="window.print()">🖨️ พิมพ์ / Save as PDF</button>
  <span>เอกสารชุดเต็มของงานสอบเทียบ 26B232-0 — ใบ Cert 3 หน้า + ใบบันทึกผล 2 หน้า + ใบความไม่แน่นอน 4 หน้า (ค่าทุกช่องมาจาก data object เดียว ระบบจริงจะเติมจากงานสอบเทียบ)</span>
</div>
<div id="pages"></div>

<script>
// ====== ข้อมูลงานสอบเทียบ (ในระบบจริงมาจาก Supabase) ======
const CAL = {
  cert_no: '26B232-0', job_no: '26B232', request_no: '-',
  client: { name: 'INTERNATIONAL  LABORATORIES  CORP.,LTD',
    addr: ['62 MU 8, BANGNA-TRAD ROAD, BANG CHALONG SUB-DISTRICT, BANG PHLI DISTRICT,', 'SAMUTPRAKAN PROVINCE, 10540, THAILAND'] },
  lab: { name: 'INTERNATIONAL LABBORATORIES CROP., LTD .', dept: 'CALIBRATION LABORATORY',
    addr: ['62 MOO 8 BANGNATRAD ROAD, BANGCHALONG', 'BANGPLEE  SAMUTHPRAKARN 10540 THAILAND'],
    phone: 'PHONE : (02)  3468222-4  FAX : (02) 3468233-4' },
  equipment: 'ELECTRONIC  BALANCE', equipment_th: 'เครื่องชั่งไฟฟ้า',
  capacity: 3100, unit: 'g', resolution: 0.01,
  manufacturer: 'Sartorius', model: 'BP3100-S', serial: '13006505',
  id_no: 'QTB2BB02-WI01', asset: '701267', accuracy_class: '-',
  condition: 'USED ITEM', adjusted: 'without', // without | after
  temp: [24.9, 25.6], rh: [62.6, 63.8],
  warmup: ['8:00', '10:00'], cal_time: ['10:00', '10:20'],
  location: 'B.3/3', section: 'Quality Test Bulk', unit_dept: 'Bulk / Powder & Lip',
  date_receive: '2026-04-24', date_cal: '2026-04-24', date_next: '2027-04-24', date_issue: '2026-05-05',
  calibrated_by: 'WUTTIPONG  ATTAWAN',
  procedure: 'SWI-CAL-705',
  user_range: '1 - 2000',
  tolerances: ['±  0.05 g (0-300)', '±  0.1 g (>300-1000) g', '±  0.15 g (>1000+3100) g'],
  standards: [
    { name: 'STANDARD WEIGHT SET', model: 'CLASS F1 ( 1 - 500 g )', cls: '1-500g/F1', serial: '158880',  id_code: 'CLCLSB08-WI01-12', cert: '26M004-0', due: '2027-01-06' },
    { name: 'STANDARD WEIGHT',     model: 'CLASS F1 ( 1 kg )',      cls: '1kg/F1',    serial: '11119464', id_code: 'CLCLSB07-WI01',   cert: '26M005-0', due: '2027-01-06' },
    { name: 'STANDARD WEIGHT',     model: 'CLASS F1 ( 2 kg )',      cls: '2kg/F1',    serial: '11119465', id_code: 'CLCLSB07-WI02',   cert: '26M005-0', due: '2027-01-06' },
  ],
  preload: { point: 3000, reads: [2999.99, 2999.99, 2999.99] },
  repeat:  { point: 2000, reads: [2000, 2000, 2000, 2000, 2000, 2000, 2000, 2000, 2000, 2000] },
  // จุดทดสอบ Error: conv = ค่าตุ้ม + ค่าแก้รวม (จากใบ Cert Standard), U_std (mg)
  points: [
    { nominal: 1,    desc: '1',         conv: 1.000004,   U: 0.03, reads: [1, 1, 1] },
    { nominal: 10,   desc: '10',        conv: 10.000047,  U: 0.06, reads: [10, 10, 10] },
    { nominal: 20,   desc: '20',        conv: 20.000079,  U: 0.08, reads: [20, 20, 20] },
    { nominal: 50,   desc: '50',        conv: 49.99999,   U: 0.10, reads: [50, 50, 50] },
    { nominal: 100,  desc: '100',       conv: 99.99993,   U: 0.16, reads: [100, 100, 100] },
    { nominal: 200,  desc: '200',       conv: 200.00017,  U: 0.30, reads: [200, 200, 200] },
    { nominal: 500,  desc: '500',       conv: 500.0001,   U: 0.80, reads: [500, 500, 500] },
    { nominal: 1000, desc: '1000',      conv: 999.9978,   U: 1.60, reads: [1000, 1000, 1000] },
    { nominal: 2000, desc: '2000',      conv: 1999.9974,  U: 3.00, reads: [2000, 2000, 2000] },
    { nominal: 3000, desc: '2000+1000', conv: 2999.9952,  U: 4.60, reads: [2999.99, 2999.99, 2999.99] },
  ],
  ecc:  { wt: 1000, positions: ['Middle (1)', 'Front left (2)', 'Back left (3)', 'Back right ( 4)', 'Front right ( 5 )'], reads: [1000, 1000, 1000.01, 999.99, 999.99], pan: 0 },
  tare: { wt: 1000, checks: [[500, 500], [2000, 2000]] },
  signers: { tech_mgr: 'PRASERT    PLAINPRASERT', director: 'DR.WANLOP   CHUSATTAYANOND', approver: 'tech_mgr' },
};

// ====== คำนวณ (สูตรเดียวกับ FRM-CAL92 / mockup) ======
const SQ3 = 1.7321;
function stdev(a) { if (a.length < 2) return 0; const m = a.reduce((x,y)=>x+y,0)/a.length; return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1)); }
const repStd = stdev(CAL.repeat.reads);
const repAvg = CAL.repeat.reads.reduce((a,b)=>a+b,0)/CAL.repeat.reads.length;
let repMaxDiff = 0; CAL.repeat.reads.forEach((v,i)=>{ if(i>0) repMaxDiff = Math.max(repMaxDiff, Math.abs(v-CAL.repeat.reads[i-1])); });
const uR_mg = (repStd / 1.732) * 1000;
const d_mg = (CAL.resolution * 1000) / 2;

function budget(nominal_g, U_std_mg) {
  const uWS = U_std_mg / 2, uDS = U_std_mg / SQ3, udo = d_mg / SQ3, ud = d_mg / SQ3;
  const ab = nominal_g * 1000 / 1e6;            // 1 ppm (mg)
  const uAb = ab / SQ3, uR = uR_mg;
  const uc = Math.sqrt(uWS**2 + uDS**2 + udo**2 + ud**2 + uAb**2 + uR**2);
  const U = uc * 2;
  const Ufinal = U >= 8.5 ? Math.ceil(U) : U;   // ปัดขึ้นเป็น mg เต็มตามแนวทางในไฟล์
  return { uWS, uDS, udo, ud, ab, uAb, uR, uc, U, Ufinal };
}
// แถว ZERO + ทุกจุด
const ROWS = [{ nominal: 0, desc: '0', conv: 0, U: 0, reads: [0,0,0], zero: true }, ...CAL.points].map(p => {
  const avg = p.reads.reduce((a,b)=>a+b,0)/p.reads.length;
  const corr = p.conv - avg;
  return { ...p, avg, corr, sd: stdev(p.reads), bud: budget(p.zero ? 0 : p.nominal, p.zero ? 0 : p.U) };
});
// eccentricity: เสมอกันให้ค่าหลังชนะ (ตามใบจริง −0.01)
let eccMax = 0; const eccDiffs = CAL.ecc.reads.map((v,i)=> i===0?0: v-CAL.ecc.reads[0]);
eccDiffs.forEach(dv => { if (Math.abs(dv) >= Math.abs(eccMax) && dv !== 0) eccMax = dv; });

// ====== format helpers ======
const f = (v,d) => { const s = v.toFixed(d); return parseFloat(s) === 0 ? (0).toFixed(d) : s; };
function fmtU(u) { return u < 10 ? u.toFixed(1) : String(Math.round(u)); } // 8.2 / 9.0 / 10 / 12
const MON = ['Jan.','Feb.','Mar.','Apr.','May','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'];
function dCert(s){ const d=new Date(s+'T00:00:00'); return `${String(d.getDate()).padStart(2,'0')}-${MON[d.getMonth()]}-${d.getFullYear()}`; }
function dTH(s){ const p=s.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
const esc = v => String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function chk(on){ return `<span class="chk">${on ? '✓' : '&nbsp;'}</span>`; }

// SVG จานชั่ง 3 แบบ (สี่เหลี่ยม/วงกลม/สามเหลี่ยม)
function panSVG(shape) {
  const lines = `<line x1="4" y1="4" x2="40" y2="40" stroke="#111" stroke-width=".8"/><line x1="40" y1="4" x2="4" y2="40" stroke="#111" stroke-width=".8"/>`;
  const nums = `<circle cx="22" cy="22" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="22" y="24" font-size="6" text-anchor="middle">1</text>
    <circle cx="10" cy="10" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="10" y="12" font-size="6" text-anchor="middle">2</text>
    <circle cx="34" cy="10" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="34" y="12" font-size="6" text-anchor="middle">4</text>
    <circle cx="10" cy="34" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="10" y="36" font-size="6" text-anchor="middle">3</text>
    <circle cx="34" cy="34" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="34" y="36" font-size="6" text-anchor="middle">5</text>`;
  if (shape === 0) return `<svg width="44" height="44" viewBox="0 0 44 44"><rect x="3" y="3" width="38" height="38" fill="none" stroke="#111" stroke-width="1"/>${lines}${nums}</svg>`;
  if (shape === 1) return `<svg width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="19" fill="none" stroke="#111" stroke-width="1"/>${lines}${nums}</svg>`;
  return `<svg width="48" height="40" viewBox="0 0 48 40"><polygon points="24,3 45,37 3,37" fill="none" stroke="#111" stroke-width="1"/>
    <circle cx="24" cy="26" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="24" y="28" font-size="6" text-anchor="middle">1</text>
    <circle cx="15" cy="32" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="15" y="34" font-size="6" text-anchor="middle">2</text>
    <circle cx="33" cy="32" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="33" y="34" font-size="6" text-anchor="middle">5</text>
    <circle cx="20" cy="20" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="20" y="22" font-size="6" text-anchor="middle">3</text>
    <circle cx="28" cy="20" r="4.5" fill="#fff" stroke="#111" stroke-width=".8"/><text x="28" y="22" font-size="6" text-anchor="middle">4</text></svg>`;
}

// ====== PAGE: Cert cover (FRM-CAL54) ======
function pageCover() {
  return `<section class="sheet">
    <div class="cv-title">
      <h1>CERTIFICATE OF CALIBRATION</h1>
      <div class="cv-certno">CERT NO. : <span class="fill">${esc(CAL.cert_no)}</span></div>
    </div>
    <div class="cv-head">
      <img src="assets/ilc-logo-symbol.png" alt="ILC" onerror="this.style.display='none'">
      <div class="cv-lab">
        <div>${esc(CAL.lab.name)}</div>
        <div>${esc(CAL.lab.dept)}</div>
        ${CAL.lab.addr.map(a => `<div>${esc(a)}</div>`).join('')}
        <div>${esc(CAL.lab.phone)}</div>
      </div>
      <div>
        <div class="it" style="margin-bottom:26px">PAGE <span class="fill">1</span> OF <span class="fill">3</span></div>
        <div>DATE OF ISSUE</div>
        <div class="fill" style="border-bottom:1px solid #111;display:inline-block;min-width:90px">${dCert(CAL.date_issue)}</div>
      </div>
    </div>
    <div class="cv-rule"></div>
    <img class="cv-watermark" src="assets/ilc-logo-symbol.png" onerror="this.style.display='none'">
    <div class="cv-row"><span>NAME OF CLIENT :</span><span class="fill">${esc(CAL.client.name)}</span></div>
    <div class="cv-row it"><span>ADDRESS OF CLIENT :</span><span class="fill">${esc(CAL.client.addr[0])}<br>${esc(CAL.client.addr[1])}</span></div>
    <div class="cv-row it" style="margin-top:14px"><span>DATE OF RECEIVE :</span><span class="fill">${dCert(CAL.date_receive)}</span></div>
    <div class="cv-row it"><span>CALIBRATION DATE :</span><span class="fill">${dCert(CAL.date_cal)}</span></div>
    <div class="cv-row"><span>EQUIPMENT :</span><span class="fill">${esc(CAL.equipment)}  ${CAL.capacity} ${CAL.unit}</span></div>
    <div class="cv-row it" style="padding-left:24px"><span>MANUFACTURER :</span><span class="fill">${esc(CAL.manufacturer)}</span></div>
    <div class="cv-row it" style="padding-left:24px"><span>MODEL :</span><span class="fill">${esc(CAL.model)}</span></div>
    <div class="cv-row it" style="padding-left:24px"><span>SERIAL NUMBER :</span><span class="fill">${esc(CAL.serial)}</span></div>
    <div class="cv-row it" style="padding-left:24px"><span>IDENTIFICATION NUMBER :</span><span class="fill">${esc(CAL.id_no)}</span></div>
    <div class="cv-row it" style="padding-left:24px"><span>RESOLUTION :</span><span class="fill">${CAL.resolution} ${CAL.unit}</span></div>
    <div class="cv-row it" style="margin-top:14px"><span>CONDITION AS-RECEIVED :</span><span class="fill">${esc(CAL.condition)}</span></div>
    <div class="cv-row it"><span>AMBIENT TEMPERATURE :</span><span class="fill">( ${CAL.temp[0]} - ${CAL.temp[1]} ) °C</span></div>
    <div class="cv-row it"><span>REL. HUMIDITY :</span><span class="fill">( ${CAL.rh[0]} - ${CAL.rh[1]} ) %</span></div>
    <div class="cv-row it"><span>PLACE OF CALIBRATION :</span><span class="fill">${esc(CAL.client.name)} / ${esc(CAL.location)}<br>${esc(CAL.client.addr[0])}<br>${esc(CAL.client.addr[1])}</span></div>
    <div class="cv-sig">
      <div>
        <div>CALIBRATED BY : <span class="fill">${esc(CAL.calibrated_by)}</span></div>
        <div class="ctr" style="margin-top:6px">TECHNICIAN</div>
      </div>
      <div>
        <div>APPROVED BY :</div>
        <div style="margin-top:10px">${chk(CAL.signers.approver === 'tech_mgr')}<span style="border-bottom:1px solid #111;display:inline-block;min-width:170px">&nbsp;</span></div>
        <div style="padding-left:20px">( ${esc(CAL.signers.tech_mgr)} )<br>TECHNICAL  MANAGEMENT  STAFF</div>
        <div style="margin-top:8px">${chk(CAL.signers.approver === 'director')}( ${esc(CAL.signers.director)} )<br><span style="padding-left:20px">DIRECTOR OF CALIBRATION LABORATORY</span></div>
      </div>
    </div>
    <div class="it" style="margin-top:18px">DATE OF APPROVAL : …..../……./…….</div>
    <div class="cv-foot">THIS CERTIFICATE MAY NOT BE REPRODUCED OTHER THAN IN FULL, EXCEPT WITH THE PRIOR WRITTEN APPROVAL OF THE ISSUING LABORATORY.</div>
    <div class="footrow"><span>FRM-CAL54-00-1265</span><span class="conf">CONFIDENTIAL B</span></div>
  </section>`;
}

// ====== หัวซ้ำของหน้า cert ต่อเนื่อง ======
function ctHead(pageNo) {
  return `<div class="hd-right">CERT.NO. :  <span class="b">${esc(CAL.cert_no)}</span><br>PAGE :  ${pageNo}  OF  3</div>
    <p class="b it u" style="margin-top:2px">CONTINUATION OF CERTIFICATE OF CALIBRATION FOR</p>
    <div class="kv it"><span>EQUIPMENT :</span><span class="b">${esc(CAL.equipment)}</span></div>
    <div class="kv2 it"><span></span><span>MANUFACTURER :</span><span class="b">${esc(CAL.manufacturer)}</span></div>
    <div class="kv2 it"><span></span><span>MODEL :</span><span class="b">${esc(CAL.model)}</span></div>
    <div class="kv2 it"><span></span><span>SERIAL NUMBER :</span><span class="b">${esc(CAL.serial)}</span></div>
    <div class="kv2 it"><span></span><span>IDENTIFICATION NUMBER :</span><span class="b">${esc(CAL.id_no)}</span></div>
    <p class="it"><span class="u">CALIBRATION DATE :</span> <span class="b">${dCert(CAL.date_cal)}</span></p>`;
}
function resultLine() {
  return `<p class="it" style="margin-top:8px"><span class="u b">RESULT OF CALIBRATION :</span>
    &nbsp;&nbsp;( ${CAL.adjusted === 'without' ? '✓' : '&nbsp;&nbsp;'} ) WITHOUT ADJUSTMENT
    &nbsp;&nbsp;&nbsp;&nbsp;( ${CAL.adjusted === 'after' ? '✓' : '&nbsp;&nbsp;'} ) AFTER ADJUSTMENT</p>
    <p class="it"><span class="b">MAXIMUM CAPACITY :</span> ${CAL.capacity} ${CAL.unit}
    &nbsp;&nbsp;&nbsp;&nbsp;<span class="b">RESOLUTION :</span> ${CAL.resolution} ${CAL.unit}</p>`;
}

// ====== PAGE: Cert page 2 (FRM-CAL55) ======
function pageCert2() {
  return `<section class="sheet ct">
    ${ctHead(2)}
    <h4>CONDITION OF THIS RESULT</h4>

function uncBlock(r) {
  const b = r.bud;
  const sym = (m, s) => `${m}<sub>${s}</sub>`;
  const rows = [
    [sym('W','S'), 'calibration of standard weight', f(r.zero?0:r.U,3), 'Normal', '2.0', '1.0', f(b.uWS,4), '∞'],
    [sym('D','S'), 'Drift since last calibration', f(r.zero?0:r.U,3), 'Rectangular', '√3', '1.0', f(b.uDS,4), '∞'],
    ['δI<sub>do</sub>', 'Digital rounding error (at zero)', f(d_mg,3), 'Rectangular', '√3', '1.0', f(b.udo,4), '∞'],
    ['δI<sub>d</sub>', 'Digital rounding error (for indicated value)', f(d_mg,3), 'Rectangular', '√3', '1.0', f(b.ud,4), '∞'],
    [sym('A','b'), `Air buoyancy ( …${r.zero?'…':'1'}… ppm of nominal value)`, f(r.zero?0:b.ab,3), 'Rectangular', '√3', '1.0', f(b.uAb,4), '∞'],
    [sym('I','R'), 'Repeatability of indication', f(uR_mg,3), 'Normal', '1.0', '1.0', f(b.uR,4), String(CAL.repeat.reads.length - 1)],
  ];
  return `<div class="blk">
    <div class="wrow"><span><span class="b">Weight  :</span> &nbsp; ${r.zero ? '0' : r.nominal} &nbsp; g</span></div>
    <table>
      <thead><tr>
        <th style="width:46px">symbol</th><th>Source of uncertainty</th><th style="width:58px">Value<br>± mg</th>
        <th style="width:78px">Probability<br>distribution</th><th style="width:52px">Divisor</th><th style="width:34px">c<sub>i</sub></th>
        <th style="width:62px">u( I<sub>X</sub> )<br>mg</th><th style="width:48px">V<sub>i</sub> or V<sub>eff</sub></th>
      </tr></thead>
      <tbody>
        ${rows.map(c => `<tr><td class="ctr">${c[0]}</td><td>${c[1]}</td><td class="ctr">${c[2]}</td><td class="ctr">${c[3]}</td><td class="ctr">${c[4]}</td><td class="ctr">${c[5]}</td><td class="ctr">${c[6]}</td><td class="ctr">${c[7]}</td></tr>`).join('')}
        <tr><td class="ctr">u( I<sub>X</sub> )</td><td>Combined standard uncertainty</td><td class="shade"></td><td class="ctr">Normal</td><td class="shade"></td><td class="shade"></td><td class="ctr">${f(b.uc,4)}</td><td class="ctr">&gt;500</td></tr>
        <tr><td class="ctr">U</td><td>Expanded uncertainty</td><td class="shade"></td><td class="ctr" style="color:#c00">Normal (k = 2)</td><td class="shade"></td><td class="shade"></td><td class="ctr">${f(b.U,4)}</td><td class="ctr">&gt;500</td></tr>
      </tbody>
    </table>
    <div class="rt" style="padding:3px 60px 0 0;font-size:12px"><span class="b">${fmtU(b.Ufinal)}</span> &nbsp;mg</div>
  </div>`;
}
